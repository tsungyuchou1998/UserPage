<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserPage</title>
    <link rel="stylesheet" href="css/UserPage.css">
    <style>
        :root {
            --primary: #4F6F52;
            --primary-dark: #3A5540;

            --secondary: #A9BBA4;

            --accent: #C97C5D;
            --accent-light: #D4A373;

            --bg: #F7F4ED;
            --bg-secondary: #EAE2D6;

            --card: #E1DDD4;

            --text: #2D2D2D;
            --text-secondary: #6B6B63;

            --border: #CFC8BC;

            --link: #5C8374;
        }

        body {
            background-color: var(--primary-dark);
        }

        .s01 {
            background-color: var(--primary);
            height: 100vh;
            position: relative;
        }

        .s01 .box01 {
            width: 200px;
            height: 200px;
            background-color: var(--secondary);
            position: absolute;
            top: 0;
            left: 0;
        }

        .s01 .box02 {
            width: 200px;
            height: 200px;
            background-color: var(--secondary);
            position: absolute;
            top: 0;
            right: 0;
        }

        .s01 .box03 {
            width: 200px;
            height: 200px;
            background-color: var(--secondary);
            position: absolute;
            bottom: 0;
            left: 0;
        }

        .s01 .box04 {
            width: 200px;
            height: 200px;
            background-color: var(--secondary);
            position: absolute;
            right: 0;
            bottom: 0;
        }

        .s01 .UserImg {
            position: absolute;
            top: 100px;
            left: 100px;
            right: 100px;
            bottom: 100px;
            background-color: var(--card);
            background-image: url(images/cat-selfy.avif);
            background-position: center center;
            background-size: cover;
            border-radius: 15px;
        }

        .s01 .UserText {
            position: absolute;
            top: 10%;
            left: 10%;
            right: 70%;
        }

        /* s02作品區 */
        .s02 {
            padding: 80px 10%;
            background-color: var(--accent-light);
            text-align: center;
        }

        .s02 h2 {
            font-size: 36px;
        }

        .s02 .card {
            display: inline-block;
            margin: 15px;
            width: 240px;
            background-color: var(--card);
            padding: 20px;
            text-align: left;
            border-radius: 12px;
        }

        .s02 .card h3 {
            margin-top: 0;
            color: var(--text);
        }

        .s02 .card p {
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .s02 .card a {
            background-color: var(--card);
            line-height: 1.6;
            color: var(--text);

            display: block;
            text-align: center;

            width: 160px;
            height: 56px;

            margin-top: 20px;
            margin-left: auto;
            margin-right: auto;
            text-decoration: none;

            /* color: var(--color_bg); */

            font-size: 20px;
            font-weight: bold;

            line-height: 56px;

            border-radius: 999px;

            box-shadow: 0 8px 20px rgba(47, 93, 140, 0.25);
        }
    </style>
</head>


<body>

    <section class="s01">
        <div class="box01"></div>
        <div class="box02"></div>
        <div class="box03"></div>
        <div class="box04"></div>
        <div class="UserImg"></div>
        <div class="UserText">
            <h1>Mio Mio 履歷</h1>
            <hr>
            <h2>應徵職位:軟體工程師</h2>
            <P>座右銘:你還記得你迄今為止吃過多少麵包嗎?</P>
        </div>
    </section>
    <section class="s02">
        <h2>我的作品</h2>
        <!-- 作品01 -->
        <div class="card">
            <h3>切版練習</h3>
            <p>使用HTML、CSS練習切版</p>
            <!-- 開新分頁 target="blank" -->
            <a href="20260527-1-AI01.html" target="_blank">查看作品</a>
        </div>

        <!-- 作品02 -->
        <div class="card">
            <h3>ERP後台介面</h3>
            <p>@media根據裝置調整介面</p>
            <a href="20260605-ch5-ai01.html" target="_blank">查看作品</a>
        </div>
        <!-- 作品03 -->
        <div class="card">
            <h3>3號網站</h3>
            <p>使用HTML、CSS練習切版</p>
            <a href="20260602-1.html" target="_blank">查看作品</a>
        </div>
        <!-- 作品04 -->
        <div class="card">
            <h3>4號網站</h3>
            <p>使用HTML、CSS練習切版</p>

        </div>

    </section>

</html>
