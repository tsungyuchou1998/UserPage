<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ch11 表單練習(JavaScript)</title>
    <link rel="stylesheet" href="css/boostrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/MY.css">
</head>

<body>
    <div class="container pt-5">
        <div class="display-4 fw-900 text-center text-bg-primary py-2 rounded-3">飲料訂單</div>
        <div class="row justify-content-center" id="s01">
            <div class="col-md-6 mt-3">
                <div class="mb-3 form-floating">
                    <input type="text" class="form-control form-control-lg" name="" id="pname" placeholder="">
                    <label for="pname" class="form-label">產品名稱(字數1-6)</label>
                    <div class="valid-feedback">產品名稱符合規定</div>
                    <div class="invalid-feedback">產品名稱不符合規定</div>
                </div>

                <div class="mb-3">
                    <label for="pnum" class="form-label">數量(1-10)</label>
                    <input type="number" class="form-control form-control-lg" value="0" min="1" max="10" id="pnum">
                    <div class="valid-feedback">數量符合規定</div>
                    <div class="invalid-feedback">數量不符合規定</div>
                </div>

                <div class="mb-3">
                    <label for="pstandard" class="form-label">產品簡介</label>
                    <input type="text" class="form-control form-control-lg" placeholder="請輸入產品規格、備註..." id="pstandard"
                        list="datalistoption">
                    <datalist id="datalistoption">
                        <option value="正常甜"></option>
                        <option value="5分甜"></option>
                        <option value="無糖"></option>
                    </datalist>
                    <div class="valid-feedback">產品規格符合規定</div>
                    <div class="invalid-feedback">產品規格不符合規定</div>
                </div>

                <div class="mb-3">
                    <div class="row">
                        <div class="col-12">
                            <select name="" id="psize" class="form-select form-select-lg is-invalid">
                                <option value="" disabled selected class="text-center fw-900">*請選擇容量*</option>
                                <option value="XL(1000cc)">XL(1000cc)</option>
                                <option value="L(700cc)">L(700cc)</option>
                                <option value="M(500cc)">M(500cc)</option>
                                <option value="S(300cc)">S(300cc)</option>
                            </select>
                            <div class="valid-feedback">已選擇容量</div>
                            <div class="invalid-feedback">請選擇容量</div>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="form-label fw-900">可加配料:至少選擇一項</div>
                    <div id="topping_group" class="is-invalid">
                        <div class="form-check form-check-inline">
                            <input type="checkbox" class="form-check-input topping_item" value="珍珠">
                            <label for="" class="form-check-label">珍珠</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="checkbox" class="form-check-input topping_item" value="波霸">
                            <label for="" class="form-check-label">波霸</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="checkbox" class="form-check-input topping_item" value="椰果">
                            <label for="" class="form-check-label">椰果</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="checkbox" class="form-check-input topping_item" value="布丁">
                            <label for="" class="form-check-label">布丁</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="checkbox" class="form-check-input topping_item" value="不加料">
                            <label for="" class="form-check-label">不加料</label>
                        </div>
                    </div>
                    <div class="valid-feedback">配料已選擇</div>
                    <div class="invalid-feedback">至少挑選一項</div>
                </div>

                <div class="mb-3">
                    <div class="form-label fw-900">取餐方式:必須選擇</div>
                    <div id="orderType_group" class="is-invalid">
                        <div class="form-check form-check-inline">
                            <input type="radio" class="form-check-input order_type" name="oderType" value="門市自取">
                            <label for="" class="form-check-label">門市自取</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="radio" class="form-check-input order_type" name="oderType" value="門市外送">
                            <label for="" class="form-check-label">門市外送(滿$300)</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="radio" class="form-check-input order_type" name="oderType" value="外送平台取餐">
                            <label for="" class="form-check-label">外送平台取餐</label>
                        </div>
                    </div>
                    <div class="valid-feedback">已選擇取餐方式</div>
                    <div class="invalid-feedback">未選擇取餐方式</div>
                </div>

                <div class="mb-3 form-check form-switch">
                    <input type="checkbox" name="" id="pbag" class="form-check-input" checked>
                    <label for="" class="form-check-label" id="pbag_text">購買袋子: 是</label>
                </div>

                <div class="text-end mt-4">
                    <button class="btn btn-secondary">取消</button>
                    <button class="btn btn-primary" id="ok_btn">確認</button>
                </div>
            </div>
        </div>

        <div class="row mt-5 justify-content-center d-none" id="s02">
            <div class="display-5 fw-900 text-center text-bg-success py-2 rounded-3">飲料訂單-明細</div>
            <div class="col-md-6 p-3">
                <div id="showmessage"></div>
                <button class="btn btn-secondary mt-3 w-100">取消</button>
                <button class="btn btn-warning mt-3 w-100">確認送出</button>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        let flag_pname = false;
        let flag_pnum = false;
        let flag_pstandard = false;
        let flag_psize = false;
        let flag_topping = false;
        let flag_oderType = false;
        $(function () {
            //監聽 #pname
            $("#pname").on("input", function () {
                console.log($(this).val().length);

                let pname = $(this).val().trim();
                if (pname.length >= 1 && pname.length <= 6) {
                    //符合規定
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");

                    flag_pname = true;
                } else {
                    //不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");

                    flag_pname = false;
                }
            });

            //監聽#pnum 接收的數字為字串，記得轉化為數字，用number()
            $("#pnum").on("input", function () {
                console.log($(this).val());

                let pnum = Number($(this).val());
                if (pnum >= 1 && pnum <= 10) {
                    //符合規定
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");

                    flag_pnum = true;
                } else {
                    //不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");

                    flag_pnum = false;
                }
            });

            //監聽#pstandard
            $("#pstandard").on("input", function () {
                console.log($(this).val());

                let pstandard = $(this).val().trim();
                if (pstandard.length >= 1 && pstandard.length <= 6) {
                    //符合規定
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");

                    flag_pstandard = true;
                } else {
                    //不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");

                    flag_pstandard = false;
                }
            });

            //監聽#psize
            $("#psize").on("change", function () {
                console.log($(this).val());

                let psize = $(this).val().trim();
                if (psize != "") {
                    //符合規定
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");

                    flag_psize = true;
                } else {
                    //不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");

                    flag_psize = false;
                }
            });

            //監聽#pbag
            $("#pbag").on("change", function () {
                console.log($(this).prop("checked"));

                let pbag = $(this).prop("checked");
                if (pbag) {
                    $("#pbag_text").text("購買袋子: 是");
                } else {
                    $("#pbag_text").text("購買袋子: 否");
                }
            });

            //監聽 .topping_item
            $(".topping_item").on("change", function () {
                console.log($(".topping_item:checked").length);
                let count = $(".topping_item:checked").length;
                if (count > 0) {
                    $("#topping_group").removeClass("is-invalid");
                    $("#topping_group").addClass("is-valid");

                    flag_topping = true;
                } else {
                    $("#topping_group").removeClass("is-valid");
                    $("#topping_group").addClass("is-invalid");

                    flag_topping = false;
                }
            });

            //監聽 .order_type
            $(".order_type").on("change", function () {
                console.log($(".order_type:checked").val());
                let oderType = $(".order_type:checked").val();
                if (oderType != undefined) {
                    $("#orderType_group").removeClass("is-invalid");
                    $("#orderType_group").addClass("is-valid");

                    flag_oderType = true;
                } else {
                    $("#orderType_group").removeClass("is-valid");
                    $("#orderType_group").addClass("is-invalid");

                    flag_oderType = false;
                }
            });
            

            //監聽#ok_btn
            $("#ok_btn").on("click", function () {
                if (flag_pname && flag_pnum && flag_pstandard && flag_psize && flag_topping) {
                    console.log("check!!");

                    //顯示飲料訂單-明細
                    $("#s02").removeClass("d-none");

                    //三元運算子
                    let pbag = $("#pbag").prop("checked") ? "是" : "否";

                    //收集配料選項
                    let toppingArray = [];
                    $(".topping_item:checked").each(function(){
                        console.log($(this).val());
                        toppingArray.push($(this).val());
                    });
                    console.log(toppingArray);

                    //取餐方式
                    let oderType = $(".order_type:checked").val();

                    let strHTML = `<h3>產品名稱: ${$("#pname").val()} </h3>
                                    <h3>產品數量: ${$("#pnum").val()} </h3>
                                    <h3>產品規格: ${$("#pstandard").val()} </h3>
                                    <h3>產品容量: ${$("#psize").val()} </h3>
                                    <h3>選取配料: ${toppingArray.join(", ")} </h3>
                                    <h3>購買袋子: ${pbag} </h3>
                                    <h3>取餐方式: ${oderType} </h3>`;
                    $("#showmessage").html(strHTML);
                } else {
                    $("#s02").addClass("d-none");
                    Swal.fire({
                        title: "輸入錯誤",
                        text: "請檢查欄位",
                        icon: "error"
                    });
                };



            });
        });
    </script>
</body>

</html>
